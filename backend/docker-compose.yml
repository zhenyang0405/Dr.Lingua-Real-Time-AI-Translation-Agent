services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8001:8080"
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GCS_BUCKET=${GCS_BUCKET}
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped

  streaming:
    build:
      context: .
      dockerfile: streaming/Dockerfile
    ports:
      - "8002:8080"
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GCS_BUCKET=${GCS_BUCKET}
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped

  visual-noun:
    build:
      context: .
      dockerfile: visual_noun/Dockerfile
    ports:
      - "8003:8080"
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GCS_BUCKET=${GCS_BUCKET}
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped
